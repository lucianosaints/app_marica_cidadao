version: '3.8'

services:
  web:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 projeto_marica.wsgi:application
    volumes:
      - .:/app
      - ./media:/app/media
      - static_volume:/app/staticfiles
    env_file:
      - .env
    environment:
      - DJANGO_DEBUG=False
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=marica_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=marica_pass

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - ./media:/app/media
      - static_volume:/app/staticfiles
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - web-root:/var/www/certbot
    depends_on:
      - web

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - web-root:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  static_volume:
  certbot-etc:
  certbot-var:
  web-root:
